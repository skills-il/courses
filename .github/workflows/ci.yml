name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate all courses
        run: |
          set -e
          for dir in */; do
            slug="${dir%/}"
            [[ "$slug" == ".github" || "$slug" == "scripts" || "$slug" == "__fixtures" ]] && continue
            echo "Validating $slug..."
            ./scripts/validate-course.sh "$slug"
          done
