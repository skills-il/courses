name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    uses: skills-il/release-workflow/.github/workflows/release.yml@v1
    with:
      subject-path: |
        **/SKILL.md
        **/SKILL_HE.md
        **/metadata.json
